<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#D4764E">
<meta name="description" content="Instagramのレシピ投稿をスクリーンショットで保存・管理">
<title>レシピセーバー - Instagram投稿管理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: #f8f7f3;
    color: #2c2c2a;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 2rem;
    background: linear-gradient(135deg, #D4764E 0%, #E89B66 100%);
    border-radius: 16px;
    color: white;
    box-shadow: 0 2px 8px rgba(212, 118, 78, 0.15);
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .header p {
    font-size: 14px;
    opacity: 0.95;
  }

  .input-section {
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .input-group {
    margin-bottom: 1.5rem;
  }

  .input-group:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 0.6rem;
    color: #2c2c2a;
  }

  input[type="text"],
  input[type="url"],
  textarea,
  select {
    width: 100%;
    padding: 0.9rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s;
    background: #fafaf8;
  }

  input[type="text"]:focus,
  input[type="url"]:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: #D4764E;
    background: white;
    box-shadow: 0 0 0 3px rgba(212, 118, 78, 0.1);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-family: inherit;
  }

  .upload-area {
    width: 100%;
    border: 2px dashed #ddd;
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: #fafaf8;
  }

  .upload-area:hover {
    border-color: #D4764E;
    background: #f5ede3;
  }

  .upload-area.dragover {
    border-color: #D4764E;
    background: #f0e6d8;
    box-shadow: 0 0 0 3px rgba(212, 118, 78, 0.1);
  }

  .upload-area-content {
    pointer-events: none;
  }

  .button-group {
    display: flex;
    gap: 0.75rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  button {
    flex: 1;
    min-width: 120px;
    padding: 0.9rem 1.5rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
    color: #2c2c2a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: #f0ede7;
    border-color: #D4764E;
  }

  button:active {
    transform: scale(0.98);
  }

  button.primary {
    background: #D4764E;
    color: white;
    border-color: #D4764E;
  }

  button.primary:hover {
    background: #C1664A;
  }

  .recipes-section {
    margin-top: 2rem;
  }

  .recipes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .recipes-header h2 {
    font-size: 22px;
    font-weight: 700;
  }

  .recipe-count {
    font-size: 13px;
    color: #888780;
    background: #f0ede7;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-weight: 600;
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid #e8e6e0;
    overflow-x: auto;
    padding-bottom: 0;
  }

  .tab-button {
    border: none;
    background: none;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: #888780;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
    white-space: nowrap;
  }

  .tab-button.active {
    color: #D4764E;
    border-bottom-color: #D4764E;
  }

  .tab-button:hover:not(.active) {
    color: #2c2c2a;
  }

  .recipes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
  }

  @media (max-width: 768px) {
    .recipes-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    
    .input-section {
      padding: 1.5rem;
    }

    .header h1 {
      font-size: 24px;
    }
  }

  @media (max-width: 480px) {
    .recipes-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .container {
      padding: 1rem;
    }

    .header {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 24px;
    }

    .input-section {
      padding: 1rem;
    }

    button {
      min-width: 100%;
    }

    .button-group {
      flex-direction: column;
    }

    .recipes-header {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  .recipe-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }

  .recipe-card:hover {
    border-color: #D4764E;
    box-shadow: 0 4px 12px rgba(212, 118, 78, 0.12);
  }

  .recipe-card.clickable {
    cursor: pointer;
  }

  .recipe-image-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #F5E6D3 0%, #E8D4B8 100%);
  }

  .recipe-image-wrapper img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .recipe-image-wrapper::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0);
    transition: background 0.3s;
    z-index: 1;
  }

  .recipe-card.clickable:hover .recipe-image-wrapper::before {
    background: rgba(0,0,0,0.1);
  }

  .recipe-image-wrapper.no-image {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    padding-bottom: 0;
  }

  .recipe-content {
    padding: 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .recipe-category {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    background: #f0ede7;
    color: #D4764E;
    padding: 0.25rem 0.6rem;
    border-radius: 12px;
    margin-bottom: 0.35rem;
    width: fit-content;
  }

  .recipe-memo {
    font-size: 11px;
    color: #5f5e5a;
    background: #fafaf8;
    padding: 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    border: 1px solid #e8e6e0;
    min-height: 40px;
    max-height: 70px;
    overflow-y: auto;
    line-height: 1.3;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .recipe-memo.empty {
    color: #888780;
    font-style: italic;
    min-height: auto;
  }

  .recipe-footer {
    border-top: 1px solid #e8e6e0;
    padding-top: 0.5rem;
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.35rem;
  }

  .recipe-date {
    font-size: 10px;
    color: #888780;
    flex: 1;
  }

  .edit-btn, .delete-btn {
    background: none;
    border: none;
    color: #888780;
    cursor: pointer;
    font-size: 14px;
    padding: 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .edit-btn:hover {
    color: #D4764E;
  }

  .delete-btn:hover {
    color: #E24B4A;
  }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem 1rem;
    color: #888780;
  }

  .empty-state-icon {
    font-size: 56px;
    margin-bottom: 1rem;
    display: block;
  }

  .empty-state p {
    font-size: 14px;
  }

  .info-message {
    background: #fafaf8;
    border-left: 4px solid #D4764E;
    padding: 1rem;
    margin-bottom: 1.5rem;
    border-radius: 4px;
    font-size: 13px;
    color: #5f5e5a;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: white;
    border-radius: 12px;
    padding: 2rem;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    position: relative;
  }

  .modal-header {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #2c2c2a;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    font-size: 24px;
    color: #888780;
    cursor: pointer;
  }

  .modal-close:hover {
    color: #2c2c2a;
  }

  .thumbnail-preview {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #F5E6D3 0%, #E8D4B8 100%);
    border-radius: 8px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .thumbnail-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .thumbnail-preview.no-image {
    font-size: 48px;
    color: #D4764E;
  }

  #imagePreview {
    margin-top: 1rem;
  }

  #previewImg {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
  }

  .modal-upload-area {
    width: 100%;
    border: 2px dashed #ddd;
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: #fafaf8;
    margin-bottom: 1rem;
  }

  .modal-upload-area:hover {
    border-color: #D4764E;
    background: #f5ede3;
  }

  .modal-upload-area.dragover {
    border-color: #D4764E;
    background: #f0e6d8;
    box-shadow: 0 0 0 3px rgba(212, 118, 78, 0.1);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🍳 レシピセーバー</h1>
    <p>Instagramのレシピ投稿をスクリーンショットで保存・管理</p>
  </div>

  <div class="info-message">
    💡 投稿のスクリーンショット、またはURLを貼り付けて保存。カテゴリーで簡単検索！
  </div>

  <div class="input-section">
    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 1.5rem; color: #2c2c2a;">新しいレシピを追加</h3>
    
    <div class="input-group">
      <label>Instagram投稿URL（任意）</label>
      <input type="url" id="postUrl" placeholder="https://instagram.com/p/ABC123...">
    </div>

    <div class="input-group">
      <label>スクリーンショット画像（任意）</label>
      <div id="uploadArea" class="upload-area" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('imageInput').click()">
        <div class="upload-area-content">
          <div style="font-size: 32px; margin-bottom: 0.5rem;">📸</div>
          <div style="font-size: 13px; color: #2c2c2a; font-weight: 500;">ここに画像をドラッグ&ドロップ</div>
          <div style="font-size: 12px; color: #888780; margin-top: 0.3rem;">またはクリックして選択</div>
        </div>
      </div>
      <input type="file" id="imageInput" style="display: none;" accept="image/*" onchange="handleImageSelect(event)">
      <div id="imagePreview" style="display: none;">
        <img id="previewImg" src="">
        <button type="button" onclick="clearImage()" style="margin-top: 0.5rem; width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">画像を削除</button>
      </div>
    </div>

    <div class="input-group">
      <label>カテゴリ</label>
      <select id="category">
        <option value="">選択してください</option>
        <option value="main">メイン料理</option>
        <option value="side">副菜</option>
        <option value="dessert">デザート・お菓子</option>
        <option value="bread">パン</option>
        <option value="soup">スープ・汁物</option>
        <option value="salad">サラダ</option>
        <option value="drink">ドリンク</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div class="input-group">
      <label>メモ / 材料</label>
      <textarea id="memo" placeholder="材料：卵、砂糖、バター...&#10;作り方：1.〇〇&#10;      2.△△&#10;備考：冷蔵庫で1時間冷やす"></textarea>
    </div>

    <div class="button-group">
      <button class="primary" onclick="saveRecipe()">💾 保存する</button>
      <button onclick="clearForm()">クリア</button>
    </div>
  </div>

  <div class="recipes-section">
    <div class="recipes-header">
      <h2>保存済みレシピ</h2>
      <div class="recipe-count" id="recipeCount">0件</div>
    </div>

    <div class="tabs" id="tabsContainer">
      <button class="tab-button active" onclick="filterRecipes('')">すべて</button>
      <button class="tab-button" onclick="filterRecipes('main')">メイン</button>
      <button class="tab-button" onclick="filterRecipes('dessert')">デザート</button>
      <button class="tab-button" onclick="filterRecipes('side')">副菜</button>
      <button class="tab-button" onclick="filterRecipes('soup')">スープ</button>
      <button class="tab-button" onclick="filterRecipes('salad')">サラダ</button>
    </div>

    <div class="recipes-grid" id="recipesGrid">
      <div class="empty-state">
        <span class="empty-state-icon">📝</span>
        <p>レシピをまだ保存していません</p>
      </div>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">レシピを編集</div>
    
    <div class="thumbnail-preview" id="modalThumbnail">
      <span style="font-size: 48px;">🍽️</span>
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 0.6rem; color: #2c2c2a;">画像を追加・変更（任意）</label>
      <div id="modalUploadArea" class="modal-upload-area" ondrop="handleModalDrop(event)" ondragover="handleModalDragOver(event)" ondragleave="handleModalDragLeave(event)" onclick="document.getElementById('modalImageInput').click()">
        <div style="font-size: 24px; margin-bottom: 0.3rem;">📸</div>
        <div style="font-size: 12px; color: #2c2c2a;">ドラッグ&ドロップまたはクリック</div>
      </div>
      <input type="file" id="modalImageInput" style="display: none;" accept="image/*" onchange="handleModalImageSelect(event)">
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 0.6rem; color: #2c2c2a;">カテゴリ</label>
      <select id="modalCategory" style="width: 100%; padding: 0.9rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fafaf8;">
        <option value="">選択してください</option>
        <option value="main">メイン料理</option>
        <option value="side">副菜</option>
        <option value="dessert">デザート・お菓子</option>
        <option value="bread">パン</option>
        <option value="soup">スープ・汁物</option>
        <option value="salad">サラダ</option>
        <option value="drink">ドリンク</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 0.6rem; color: #2c2c2a;">メモ / 材料</label>
      <textarea id="modalMemo" style="width: 100%; padding: 0.9rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; min-height: 150px; font-size: 14px; background: #fafaf8;"></textarea>
    </div>

    <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
      <button class="primary" style="flex: 1;" onclick="saveEditedMemo()">保存</button>
      <button style="flex: 1;" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'recipes_data_v7';
let currentEditId = null;
let currentImageData = null;
let modalImageData = null;

function loadRecipes() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : [];
  } catch (e) {
    console.error('データ読み込みエラー:', e);
    return [];
  }
}

function saveRecipesToStorage(recipes) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
  } catch (e) {
    alert('データ保存に失敗しました。ストレージがいっぱいの可能性があります。');
    console.error('保存エラー:', e);
  }
}

function getCategoryLabel(category) {
  const labels = {
    'main': 'メイン料理',
    'side': '副菜',
    'dessert': 'デザート・お菓子',
    'bread': 'パン',
    'soup': 'スープ・汁物',
    'salad': 'サラダ',
    'drink': 'ドリンク',
    'other': 'その他'
  };
  return labels[category] || category;
}

function handleDragOver(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.add('dragover');
}

function handleDragLeave(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.remove('dragover');
}

function handleDrop(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.remove('dragover');
  
  const files = event.dataTransfer.files;
  if (files.length > 0) {
    handleImageFile(files[0]);
  }
}

function handleImageSelect(event) {
  const files = event.target.files;
  if (files.length > 0) {
    handleImageFile(files[0]);
  }
}

function handleImageFile(file) {
  if (!file.type.startsWith('image/')) {
    alert('画像ファイルを選択してください');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    currentImageData = e.target.result;
    document.getElementById('previewImg').src = currentImageData;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  currentImageData = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadArea').style.display = 'block';
}

function handleModalDragOver(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.add('dragover');
}

function handleModalDragLeave(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.remove('dragover');
}

function handleModalDrop(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.remove('dragover');
  
  const files = event.dataTransfer.files;
  if (files.length > 0) {
    handleModalImageFile(files[0]);
  }
}

function handleModalImageSelect(event) {
  const files = event.target.files;
  if (files.length > 0) {
    handleModalImageFile(files[0]);
  }
}

function handleModalImageFile(file) {
  if (!file.type.startsWith('image/')) {
    alert('画像ファイルを選択してください');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    modalImageData = e.target.result;
    const preview = document.getElementById('modalThumbnail');
    preview.innerHTML = `<img src="${modalImageData}" alt="thumbnail">`;
  };
  reader.readAsDataURL(file);
}

function saveRecipe() {
  const url = document.getElementById('postUrl').value.trim();
  const memo = document.getElementById('memo').value.trim();
  const category = document.getElementById('category').value;
  
  if (!url && !currentImageData) {
    alert('投稿URLまたは画像をアップロードしてください');
    return;
  }

  const recipe = {
    id: Date.now(),
    url: url,
    category: category,
    memo: memo,
    thumbnail: currentImageData,
    savedDate: new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' })
  };

  const recipes = loadRecipes();
  recipes.unshift(recipe);
  saveRecipesToStorage(recipes);

  clearForm();
  renderRecipes();
  alert('✅ レシピを保存しました！');
}

function clearForm() {
  document.getElementById('postUrl').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('category').value = '';
  clearImage();
  document.getElementById('postUrl').focus();
}

function deleteRecipe(id) {
  if (confirm('このレシピを削除しますか？')) {
    let recipes = loadRecipes();
    recipes = recipes.filter(r => r.id !== id);
    saveRecipesToStorage(recipes);
    renderRecipes();
  }
}

function filterRecipes(category) {
  const recipes = loadRecipes();
  const filtered = category ? recipes.filter(r => r.category === category) : recipes;
  
  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  renderRecipes(filtered);
}

function openEditModal(id, event) {
  event.stopPropagation();
  const recipes = loadRecipes();
  const recipe = recipes.find(r => r.id === id);
  if (!recipe) return;

  currentEditId = id;
  modalImageData = null;
  document.getElementById('modalMemo').value = recipe.memo;
  document.getElementById('modalCategory').value = recipe.category || '';
  
  const preview = document.getElementById('modalThumbnail');
  if (recipe.thumbnail) {
    preview.innerHTML = `<img src="${recipe.thumbnail}" alt="thumbnail">`;
  } else {
    preview.innerHTML = '🍽️';
  }

  document.getElementById('editModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
  currentEditId = null;
  modalImageData = null;
}

function saveEditedMemo() {
  const memo = document.getElementById('modalMemo').value.trim();
  const category = document.getElementById('modalCategory').value;
  let recipes = loadRecipes();
  const recipeIndex = recipes.findIndex(r => r.id === currentEditId);
  
  if (recipeIndex !== -1) {
    recipes[recipeIndex].memo = memo;
    recipes[recipeIndex].category = category;
    if (modalImageData) {
      recipes[recipeIndex].thumbnail = modalImageData;
    }
    saveRecipesToStorage(recipes);
    renderRecipes();
    closeModal();
    alert('✅ レシピを更新しました！');
  }
}

function openLink(url, event) {
  if (event) event.stopPropagation();
  if (url) {
    window.open(url, '_blank', 'noopener,noreferrer');
  }
}

function renderRecipes(recipesToShow = null) {
  const recipes = recipesToShow || loadRecipes();
  const grid = document.getElementById('recipesGrid');
  const count = document.getElementById('recipeCount');

  count.textContent = `${recipes.length}件`;

  if (recipes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">📝</span>
        <p>レシピをまだ保存していません</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = recipes.map(recipe => `
    <div class="recipe-card ${recipe.url ? 'clickable' : ''}" ${recipe.url ? `onclick="openLink('${recipe.url.replace(/'/g, "\\'")}', event)"` : ''}>
      <div class="recipe-image-wrapper" ${recipe.url ? `title="クリックで投稿を開く"` : ''}>
        ${recipe.thumbnail ? `
          <img src="${recipe.thumbnail}" alt="recipe" onerror="this.parentElement.classList.add('no-image'); this.parentElement.innerHTML='🍽️';">
        ` : `
          <div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 40px;">🍽️</div>
        `}
      </div>
      
      <div class="recipe-content">
        ${recipe.category ? `<div class="recipe-category">${getCategoryLabel(recipe.category)}</div>` : ''}
        <div class="recipe-memo ${recipe.memo ? '' : 'empty'}">
          ${recipe.memo ? recipe.memo.substring(0, 100) : 'メモなし'}
        </div>

        <div class="recipe-footer">
          <div class="recipe-date">📅 ${recipe.savedDate}</div>
          <button class="edit-btn" onclick="openEditModal(${recipe.id}, event)" title="編集">✏️</button>
          <button class="delete-btn" onclick="deleteRecipe(${recipe.id})" title="削除">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
  }
});

renderRecipes();
</script>

</body>
</html>
