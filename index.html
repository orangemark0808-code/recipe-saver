<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FF7F00">
<meta name="description" content="Instagramのお気に入り投稿を保存・管理">
<title>Recipe Saver</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=DM+Mono:wght@300;400&family=Nunito:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E8E4DC;
    --accent: #FF7F00;
    --accent-dark: #E07000;
    --accent-light: #FFF3E0;
    --text: #3a2a1a;
    --muted: #9a8878;
    --radius: 14px;
    --shadow: 0 2px 14px rgba(255,127,0,0.07);
  }

  html, body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  body.modal-open {
    overflow: hidden;
    touch-action: none;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
    padding: 3rem 2rem;
    background: var(--accent);
    border-radius: var(--radius);
    color: white;
    box-shadow: var(--shadow);
  }

  .header-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 999px;
    margin-bottom: 1.25rem;
    opacity: 0.92;
  }

  .header h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-style: normal;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    letter-spacing: -0.01em;
    margin-bottom: 0.75rem;
  }

  .header h1 span {
    font-family: 'Nunito', sans-serif;
    font-style: italic;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
  }

  .header p {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    opacity: 0.92;
  }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    margin-bottom: 2.5rem;
    box-shadow: var(--shadow);
  }

  .input-group {
    margin-bottom: 1.75rem;
  }

  .input-group:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    color: var(--muted);
  }

  input[type="text"],
  input[type="url"],
  textarea,
  select {
    width: 100%;
    padding: 0.9rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    line-height: 1.7;
    transition: all 0.2s;
    background: var(--surface2);
    color: var(--text);
  }

  input[type="text"]:focus,
  input[type="url"]:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-family: inherit;
  }

  .upload-area {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface2);
  }

  .upload-area:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .upload-area.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .upload-area-content {
    pointer-events: none;
  }

  .button-group {
    display: flex;
    gap: 0.75rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  button {
    flex: 1;
    min-width: 120px;
    padding: 0.9rem 1.5rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: var(--surface2);
    border-color: var(--accent);
  }

  button:active {
    transform: scale(0.98);
  }

  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    border-radius: 8px;
  }

  button.primary:hover {
    background: var(--accent-dark);
  }

  .recipes-section {
    margin-top: 2rem;
  }

  .recipes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .recipes-header h2 {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 600;
  }

  .recipe-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: var(--surface2);
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-weight: 400;
  }

  .filter-select-wrap {
    margin-bottom: 1rem;
  }

  .category-filter-select {
    width: 100%;
    padding: 0.95rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    appearance: none;
    -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 22px) calc(50% - 3px), calc(100% - 16px) calc(50% - 3px);
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
  }

  .category-filter-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    background-color: var(--surface);
  }

  .search-box {
    margin-bottom: 0.85rem;
  }

  .search-box input {
    width: 100%;
    padding: 0.95rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 15px;
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .tabs {
    display: none !important;
  }

  .tab-button {
    border: none;
    background: none;
    padding: 0.5rem 0.75rem;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
    white-space: nowrap;
  }

  .tab-button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-button:hover:not(.active) {
    color: var(--text);
  }

  @media (max-width: 480px) {
    .tabs {
      gap: 0.25rem;
      margin-bottom: 1rem;
    }

    .tab-button {
      padding: 0.6rem 0.8rem;
      font-size: 12px;
    }
  }

  .recipes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
  }

  @media (max-width: 768px) {
    .recipes-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .input-section {
      padding: 1.5rem;
    }

    .header h1 {
      font-size: 28px;
    }
  }

  @media (max-width: 480px) {
    .recipes-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .container {
      padding: 1.5rem 1rem;
    }

    .header {
      padding: 2rem 1.5rem;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 26px;
    }

    .input-section {
      padding: 1.5rem;
    }

    button {
      min-width: 100%;
    }

    .button-group {
      flex-direction: column;
    }

    .recipes-header {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }

  .recipe-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 18px rgba(255,127,0,0.12);
  }

  .recipe-image-link {
    cursor: pointer;
  }

  .recipe-image-link:hover::before {
    background: rgba(58,42,26,0.08);
  }

  .recipe-image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: var(--surface2);
  }

  .recipe-image-wrapper img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .recipe-image-wrapper::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0);
    transition: background 0.3s;
    z-index: 1;
  }

  .recipe-image-wrapper.no-image {
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-bottom: 1px solid var(--border);
  }

  .placeholder-card {
    width: 100%;
    height: 100%;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    text-align: center;
    padding: 1rem;
    position: relative;
    z-index: 1;
  }

  .placeholder-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    font-weight: 700;
    color: var(--text);
    font-size: 14px;
  }

  .placeholder-domain {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    line-height: 1.6;
    color: var(--muted);
    font-weight: 400;
  }

  .placeholder-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    line-height: 1.6;
    color: var(--muted);
    font-weight: 400;
  }

  .no-image-logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  .recipe-content {
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    cursor: default;
  }

  .recipe-content * {
    position: relative;
    z-index: 2;
  }

  .recipe-edit-zone {
    cursor: pointer;
  }

  .recipe-edit-zone:hover .recipe-memo,
  .recipe-edit-zone:hover .recipe-category {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .recipe-category {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 400;
    background: var(--accent-light);
    color: var(--accent-dark);
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    margin-bottom: 0.5rem;
    width: fit-content;
  }

  .recipe-memo {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: var(--surface2);
    padding: 0.6rem;
    border-radius: 8px;
    margin-bottom: 0.5rem;
    border: 1px solid var(--border);
    min-height: 40px;
    max-height: 70px;
    overflow-y: auto;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .recipe-memo.empty {
    color: var(--muted);
    font-style: italic;
    min-height: auto;
  }

  .footer-actions {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }

  .recipe-footer {
    border-top: 1px solid var(--border);
    padding-top: 0.6rem;
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.2rem;
  }

  .recipe-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex: 1;
  }

  .favorite-btn, .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    margin: 0;
    transition: color 0.2s, transform 0.15s;
    flex: 0 0 auto;
    width: auto;
    height: auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    text-align: center;
    box-shadow: none;
    appearance: none;
    -webkit-appearance: none;
    font-family: 'Nunito', sans-serif;
  }

  .favorite-btn {
    font-size: clamp(18px, 4vw, 22px);
    min-width: 28px;
  }

  .delete-btn {
    font-size: clamp(13px, 3vw, 15px);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    min-width: 22px;
  }

  .favorite-btn:hover {
    transform: scale(1.08);
  }

  .favorite-btn.active {
    color: var(--accent);
  }

  .delete-btn:hover {
    color: var(--accent);
  }

  @media (max-width: 480px) {
    .favorite-btn {
      font-size: 20px;
      min-width: 26px;
    }

    .delete-btn {
      font-size: 13px;
      min-width: 20px;
    }
  }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state-icon {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: block;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.7;
  }

  .info-message {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1.75rem;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58, 42, 26, 0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: min(860px, 100%);
    max-height: min(92vh, 100dvh - 24px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 12px 40px rgba(58, 42, 26, 0.18);
    position: relative;
  }

  .modal-header {
    font-family: 'Lora', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 1.25rem;
    color: var(--text);
    padding-right: 2.5rem;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }

  .modal-close {
    position: sticky;
    top: 0;
    float: right;
    margin-left: auto;
    margin-top: -0.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 42px;
    height: 42px;
    min-width: 42px;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover {
    color: var(--accent);
    background: var(--accent-light);
  }

  @media (max-width: 768px) {
    .modal {
      padding: 0 !important;
      align-items: stretch !important;
      justify-content: stretch !important;
      background: rgba(58, 42, 26, 0.35);
    }

    .modal-content {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      min-width: 100vw !important;
      min-height: 100dvh !important;
      max-width: 100vw !important;
      max-height: 100dvh !important;
      border-radius: 0 !important;
      padding: calc(14px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom)) 12px !important;
      box-shadow: none !important;
      margin: 0 !important;
    }

    .modal-header {
      font-size: 22px;
      margin-bottom: 0.85rem;
      padding-right: 0;
    }

    .modal-close {
      display: none !important;
    }

    .thumbnail-preview {
      width: 100%;
      height: min(44vh, 420px);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }

    .modal-upload-area {
      width: 100%;
      padding: 1.25rem;
    }

    #modalMemo {
      min-height: 36vh !important;
      font-size: 16px !important;
      line-height: 1.7;
    }
  }

  @media (max-width: 420px) {
    .modal-content {
      padding-left: 10px !important;
      padding-right: 10px !important;
    }

    .thumbnail-preview {
      height: min(40vh, 360px);
    }
  }

  .thumbnail-preview {
    width: 100%;
    height: 200px;
    background: var(--surface2);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .thumbnail-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .thumbnail-preview.no-image {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: initial;
    color: inherit;
  }

  .thumbnail-preview.no-image .placeholder-card {
    min-height: auto;
  }

  #imagePreview {
    margin-top: 1rem;
  }

  #previewImg {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
  }

  .modal-upload-area {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface2);
    margin-bottom: 1rem;
  }

  .modal-upload-area:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }

  #modalCategory,
  #modalMemo,
  #modalUploadArea {
    width: 100%;
  }

  #modalMemo {
    min-height: 220px;
  }

  @media (max-width: 768px) {
    .modal-actions {
      flex-direction: column;
      position: sticky;
      bottom: calc(-1 * env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--surface), rgba(255,255,255,0.96));
      padding-top: 0.75rem;
    }

    .modal-actions button {
      min-width: 100%;
    }
  }

  .site-footer {
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    margin-top: 2.5rem;
    padding: 1.25rem 0 0.5rem;
  }

  .modal-upload-area.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(24px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: #fff;
    padding: 12px 18px;
    border-radius: 999px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 100001;
    box-shadow: 0 8px 24px rgba(58,42,26,0.18);
    white-space: nowrap;
    max-width: calc(100vw - 32px);
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px) {
    .toast {
      font-size: 13px;
      padding: 11px 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      max-width: calc(100vw - 24px);
    }
  }

</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="header-badge">Bookmark</span>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyABS_NRRkZ7tACRYPY3K2uYtSTFwxFMwUU",
  authDomain: "my-toolbox-7c6cb.firebaseapp.com",
  projectId: "my-toolbox-7c6cb",
  storageBucket: "my-toolbox-7c6cb.appspot.com",
  messagingSenderId: "981146031868",
  appId: "1:981146031868:web:5b73490c50499eddaee979"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const RECIPES_COLLECTION = 'insta_bookmarks';
const CLOUDINARY_CLOUD_NAME = 'digakqicb';
const CLOUDINARY_UPLOAD_PRESET = 'insta_bookmarks';

const CUSTOM_CATEGORIES_KEY = 'instaSaverCustomCategories';

function getBuiltInCategories() {
  return [
    { value: 'snack', label: 'おやつ' },
    { value: 'main', label: 'メイン' },
    { value: 'side', label: '副菜' },
    { value: 'soup', label: 'スープ・汁物' },
    { value: 'kickboxing', label: 'キックボクシング' },
    { value: 'it', label: 'IT関連' },
    { value: 'beauty', label: '美容' },
    { value: 'other', label: 'その他' }
  ];
}

function loadCustomCategories() {
  return [];
}

function saveCustomCategories(categories) {
  return;
}

function slugifyCategoryLabel(label) {
  return label
    .trim()
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-ぁ-んァ-ヶー一-龠]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '') || `custom-${Date.now()}`;
}

function getAllCategories() {
  const builtIn = getBuiltInCategories();
  const custom = loadCustomCategories();
  return [...builtIn, ...custom];
}

function refreshCategorySelects(selectedMain = null, selectedModal = null) {
  const allCategories = getAllCategories();
  const selects = [
    { id: 'category', selected: selectedMain },
    { id: 'modalCategory', selected: selectedModal }
  ];

  selects.forEach(({ id, selected }) => {
    const select = document.getElementById(id);
    if (!select) return;

    const currentValue = selected !== null ? selected : select.value;
    select.innerHTML = '<option value="">選択してください</option>' +
      allCategories.map(cat => `<option value="${cat.value}">${cat.label}</option>`).join('');

    if (allCategories.some(cat => cat.value === currentValue)) {
      select.value = currentValue;
    } else if (currentValue === '') {
      select.value = '';
    }
  });

  renderCategoryTabs();
}

function addCustomCategory(isModal = false) {
  return;
}

function renderCategoryTabs() {
  const select = document.getElementById('categoryFilterSelect');
  if (!select) return;

  const allCategories = getBuiltInCategories();
  select.innerHTML = '<option value="">すべて</option><option value="favorites">お気に入り</option>' +
    allCategories.map(cat => `<option value="${cat.value}">${cat.label}</option>`).join('');

  select.value = currentFilterCategory || '';
}

function getDomainFromUrl(url) {
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch {
    return '';
  }
}

function getDisplayTitle(recipe) {
  if (recipe.memo && recipe.memo.trim()) return recipe.memo.trim();

  if (recipe.post_url) {
    try {
      const url = new URL(recipe.post_url);
      const segments = url.pathname.split('/').filter(Boolean);
      const type = segments[0] || 'post';
      const id = segments[1] || '';
      const typeLabelMap = { reels: 'リール', reel: 'リール', p: '投稿', tv: '動画' };
      return `Instagram ${typeLabelMap[type] || '投稿'} ${id ? ' / ' + id : ''}`.trim();
    } catch {
      return 'Instagram 投稿';
    }
  }

  return '保存済み投稿';
}

let currentEditId = null;
let currentImageFile = null;
let modalImageFile = null;
let currentFilterCategory = '';
let currentSearchQuery = '';

function getCategoryLabel(category) {
  const legacyMap = {
    dessert: 'おやつ',
    ai: 'IT関連',
    salad: 'その他',
    bread: 'その他',
    drink: 'その他'
  };
  const normalized = legacyMap[category] ? Object.keys(legacyMap).find(key => key === category) : category;
  if (legacyMap[category]) return legacyMap[category];
  const found = getAllCategories().find(cat => cat.value === category);
  return found ? found.label : category;
}

function normalizeInstagramUrl(rawUrl) {
  const value = (rawUrl || '').trim();
  if (!value) return '';

  try {
    const url = new URL(value);
    return `${url.origin}${url.pathname}`;
  } catch {
    return value;
  }
}

async function loadRecipes() {
  try {
    const q = query(collection(db, RECIPES_COLLECTION), orderBy('created_at', 'desc'));
    const snapshot = await getDocs(q);
    return snapshot.docs.map(d => ({ id: d.id, ...d.data(), favorite: !!d.data().favorite }));
  } catch (error) {
    console.error('データ読み込みエラー:', error);
    alert('データの読み込みに失敗しました');
    return [];
  }
}

async function uploadImage(file) {
  if (!file) return null;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('画像アップロードに失敗しました');
  const data = await res.json();
  return data.secure_url;
}

function handleDragOver(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.add('dragover');
}

function handleDragLeave(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.remove('dragover');
}

function handleDrop(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('uploadArea').classList.remove('dragover');

  const files = event.dataTransfer.files;
  if (files.length > 0) {
    handleImageFile(files[0]);
  }
}

function handleImageSelect(event) {
  const files = event.target.files;
  if (files.length > 0) {
    handleImageFile(files[0]);
  }
}

function handleImageFile(file) {
  if (!file.type.startsWith('image/')) {
    alert('画像ファイルを選択してください');
    return;
  }

  currentImageFile = file;
  const objectUrl = URL.createObjectURL(file);
  document.getElementById('previewImg').src = objectUrl;
  document.getElementById('imagePreview').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';
}

function clearImage() {
  currentImageFile = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('uploadArea').style.display = 'block';
}

function handleModalDragOver(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.add('dragover');
}

function handleModalDragLeave(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.remove('dragover');
}

function handleModalDrop(event) {
  event.preventDefault();
  event.stopPropagation();
  document.getElementById('modalUploadArea').classList.remove('dragover');

  const files = event.dataTransfer.files;
  if (files.length > 0) {
    handleModalImageFile(files[0]);
  }
}

function handleModalImageSelect(event) {
  const files = event.target.files;
  if (files.length > 0) {
    handleModalImageFile(files[0]);
  }
}

function handleModalImageFile(file) {
  if (!file.type.startsWith('image/')) {
    alert('画像ファイルを選択してください');
    return;
  }

  modalImageFile = file;
  const objectUrl = URL.createObjectURL(file);
  const preview = document.getElementById('modalThumbnail');
  preview.innerHTML = `<img src="${objectUrl}" alt="thumbnail">`;
}

async function saveRecipe() {
  const url = normalizeInstagramUrl(document.getElementById('postUrl').value);
  const memo = document.getElementById('memo').value.trim();
  const category = document.getElementById('category').value;

  if (!url && !currentImageFile) {
    alert('投稿URLまたは画像をアップロードしてください');
    return;
  }

  try {
    let thumbnailUrl = null;

    if (currentImageFile) {
      thumbnailUrl = await uploadImage(currentImageFile);
    }

    await addDoc(collection(db, RECIPES_COLLECTION), {
      post_url: url,
      category: category,
      memo: memo,
      thumbnail_url: thumbnailUrl,
      saved_date: new Date().toLocaleDateString('ja-JP', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }),
      created_at: new Date().toISOString(),
      favorite: false
    });

    clearForm();
    await renderRecipes(currentFilterCategory);
    showToast('✔ 保存しました！');
  } catch (err) {
    console.error(err);
    alert(err.message || '保存中にエラーが発生しました');
  }
}

function clearForm() {
  document.getElementById('postUrl').value = '';
  document.getElementById('memo').value = '';
  document.getElementById('category').value = '';
  clearImage();
  document.getElementById('postUrl').focus();
}

async function deleteRecipe(id, event) {
  if (event) event.stopPropagation();
  if (!confirm('このレシピを削除しますか？')) return;

  try {
    await deleteDoc(doc(db, RECIPES_COLLECTION, id));
  } catch (error) {
    console.error('削除エラー:', error);
    alert('削除に失敗しました');
    return;
  }

  await renderRecipes(currentFilterCategory);
}

function handleSearchInput(value) {
  currentSearchQuery = (value || '').trim().toLowerCase();
  renderRecipes(currentFilterCategory);
}

async function filterRecipes(category, clickedButton = null) {
  currentFilterCategory = category;

  const select = document.getElementById('categoryFilterSelect');
  if (select && select.value !== category) {
    select.value = category;
  }

  await renderRecipes(category);
}

async function openEditModal(id, event) {
  event.stopPropagation();

  const recipes = await loadRecipes();
  const recipe = recipes.find(r => r.id === id);
  if (!recipe) return;

  currentEditId = id;
  modalImageFile = null;
  document.getElementById('modalMemo').value = recipe.memo || '';
  document.getElementById('modalCategory').value = recipe.category || '';

  const preview = document.getElementById('modalThumbnail');
  if (recipe.thumbnail_url) {
    preview.classList.remove('no-image');
    preview.innerHTML = `<img src="${recipe.thumbnail_url}" alt="thumbnail">`;
  } else {
    preview.classList.add('no-image');
    preview.innerHTML = '<div class="placeholder-card"><div class="no-image-logo">NO IMAGE</div></div>';
  }

  document.getElementById('editModal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
  document.body.classList.remove('modal-open');
  currentEditId = null;
  modalImageFile = null;
}

async function saveEditedMemo() {
  const memo = document.getElementById('modalMemo').value.trim();
  const category = document.getElementById('modalCategory').value;

  try {
    const updateData = {
      memo: memo,
      category: category
    };

    if (modalImageFile) {
      const thumbnailUrl = await uploadImage(modalImageFile);
      updateData.thumbnail_url = thumbnailUrl;
    }

    await updateDoc(doc(db, RECIPES_COLLECTION, currentEditId), updateData);

    closeModal();
    await renderRecipes(currentFilterCategory);
    showToast('✔ 更新しました！');
  } catch (err) {
    console.error(err);
    alert(err.message || '更新中にエラーが発生しました');
  }
}

async function toggleFavorite(id, currentValue, event) {
  if (event) event.stopPropagation();

  try {
    await updateDoc(doc(db, RECIPES_COLLECTION, id), { favorite: !currentValue });
    await renderRecipes(currentFilterCategory);
  } catch (err) {
    console.error(err);
    alert('お気に入り更新に失敗しました');
  }
}

function openLink(url, event) {
  if (event) event.stopPropagation();
  if (url) {
    window.open(url, '_blank', 'noopener,noreferrer');
  }
}

function openEditFromCard(id, event) {
  if (event) event.stopPropagation();
  openEditModal(id, event || { stopPropagation() {} });
}

async function renderRecipes(category = '') {
  let recipes = await loadRecipes();

  if (category) {
    if (category === 'favorites') {
      recipes = recipes.filter(r => !!r.favorite);
    } else {
      const legacyFilterMap = {
        snack: ['snack', 'dessert'],
        it: ['it', 'ai'],
        other: ['other', 'salad', 'bread', 'drink']
      };
      const allowed = legacyFilterMap[category] || [category];
      recipes = recipes.filter(r => allowed.includes(r.category));
    }
  }

  if (currentSearchQuery) {
    recipes = recipes.filter(r => {
      const categoryLabel = (getCategoryLabel(r.category || '') || '').toLowerCase();
      const memo = (r.memo || '').toLowerCase();
      const url = (r.post_url || '').toLowerCase();
      return memo.includes(currentSearchQuery) ||
             url.includes(currentSearchQuery) ||
             categoryLabel.includes(currentSearchQuery);
    });
  }

  const grid = document.getElementById('recipesGrid');
  const count = document.getElementById('recipeCount');

  count.textContent = `${recipes.length}件`;

  if (recipes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">📝</span>
        <p>お気に入り投稿をまだ保存していません</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = recipes.map(recipe => `
    <div class="recipe-card">
      <div class="recipe-image-wrapper ${recipe.thumbnail_url ? '' : 'no-image'} ${recipe.post_url ? 'recipe-image-link' : ''}" ${recipe.post_url ? `title="クリックで投稿を開く" onclick="openLink('${recipe.post_url.replace(/'/g, "\\'")}', event)"` : ''}>
        ${recipe.thumbnail_url ? `
          <img src="${recipe.thumbnail_url}" alt="post thumbnail" onerror="this.parentElement.classList.add('no-image'); this.parentElement.innerHTML = createPlaceholderCardHtml('${encodeURIComponent(JSON.stringify(recipe)).replace(/'/g, "%27")}');">
        ` : createPlaceholderCardHtml(encodeURIComponent(JSON.stringify(recipe)))}
      </div>

      <div class="recipe-content">
        <div class="recipe-edit-zone" onclick="openEditFromCard('${recipe.id}', event)">
          ${recipe.category ? `<div class="recipe-category">${getCategoryLabel(recipe.category)}</div>` : ''}
          <div class="recipe-memo ${recipe.memo ? '' : 'empty'}">
            ${recipe.memo ? recipe.memo.substring(0, 100) : 'メモなし'}
          </div>
        </div>

        <div class="recipe-footer">
          <div class="recipe-date">📅 ${recipe.saved_date || ''}</div>
          <div class="footer-actions">
            <button class="delete-btn" onclick="deleteRecipe('${recipe.id}', event)" title="削除">🗑️</button>
            <button class="favorite-btn ${recipe.favorite ? 'active' : ''}" onclick="toggleFavorite('${recipe.id}', ${recipe.favorite ? 'true' : 'false'}, event)" title="お気に入り">${recipe.favorite ? '★' : '☆'}</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');;
}

function createPlaceholderCardHtml(encodedRecipe) {
  let recipe = {};
  try {
    recipe = JSON.parse(decodeURIComponent(encodedRecipe));
  } catch {}

  const label = recipe.category ? getCategoryLabel(recipe.category) : 'NO IMAGE';

  return `
    <div class="placeholder-card">
      <div class="no-image-logo">${escapeHtml(label)}</div>
    </div>
  `;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(message) {
  const toast = document.getElementById('customToast');
  if (!toast) return;

  toast.textContent = message;
  toast.classList.add('show');

  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  refreshCategorySelects();
  await renderRecipes();
